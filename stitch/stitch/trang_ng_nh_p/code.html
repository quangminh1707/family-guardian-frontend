<style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0e0e10;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      background: rgba(25, 25, 28, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .gradient-bg {
      background: radial-gradient(circle at top left, rgba(138, 76, 252, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at bottom right, rgba(105, 156, 255, 0.1) 0%, transparent 40%);
    }
    .cta-gradient {
      background: linear-gradient(135deg, #8a4cfc 0%, #699cff 100%);
    }
    .ambient-glow {
      box-shadow: 0 0 80px -20px rgba(138, 76, 252, 0.3);
    }

<body class="text-on-background min-h-screen flex items-center justify-center p-6 gradient-bg">
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none">
<div class="absolute top-[10%] left-[15%] w-96 h-96 bg-primary-dim/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[10%] right-[15%] w-80 h-80 bg-secondary-dim/10 rounded-full blur-[100px]"></div>
</div>
<main class="w-full max-w-md relative">
<!-- Login Card -->
<div class="glass-effect rounded-[2.5rem] p-10 md:p-12 ambient-glow border border-white/5 flex flex-col items-center text-center">
<!-- Logo Section -->
<div class="mb-10 flex flex-col items-center">
<div class="w-16 h-16 rounded-2xl bg-surface-container-highest flex items-center justify-center mb-4 shadow-inner">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">
            shield
          </span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-white">Family Guardian</h1>
</div>
<!-- Text Content -->
<div class="space-y-4 mb-10">
<h2 class="text-[28px] leading-tight font-semibold text-white">
          Đăng nhập dành cho Phụ huynh
        </h2>
<p class="text-on-surface-variant text-base leading-relaxed">
          Giám sát và bảo vệ hoạt động trực tuyến của con bạn một cách an toàn và chuyên nghiệp.
        </p>
</div>
<!-- Action Button -->
<button class="w-full group relative flex items-center justify-center gap-4 bg-white hover:bg-neutral-100 text-black font-semibold py-4 px-6 rounded-full transition-all duration-300 transform active:scale-[0.98] shadow-lg">
<!-- Google Icon Placeholder -->
<svg class="w-6 h-6" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-lg">Đăng nhập với Google</span>
</button>
<!-- Security Badge (Optional UX Addition for "Secure Aesthetic") -->
<div class="mt-10 flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-primary text-sm">lock</span>
<span class="text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant">Kết nối mã hóa 256-bit</span>
</div>
</div>
<!-- Footer -->
<footer class="mt-10 text-center">
<p class="text-on-surface-variant font-medium text-sm">
        Dành cho bố/mẹ hoặc người giám hộ
      </p>
<div class="mt-8 flex justify-center gap-6">
<a class="text-xs text-on-surface-variant hover:text-white transition-colors" href="#">Điều khoản dịch vụ</a>
<a class="text-xs text-on-surface-variant hover:text-white transition-colors" href="#">Chính sách bảo mật</a>
</div>
</footer>
</main>
